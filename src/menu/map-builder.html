<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Map Builder — HQ Strategy Game</title>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=VT323&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="map-builder.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="bg-desk"></div>
<div id="app" data-screen-label="Map Builder"></div>

<!-- Map Builder JSX — inlined because Babel XHR is blocked on file:// protocol -->
<script type="text/babel" data-presets="react">
(function () {
  'use strict';
  const { useState, useEffect, useMemo, useRef, useCallback } = React;

  // ── Constants ────────────────────────────────────────────────
  const EMPTY = -1;
  const GRID_MIN = 6, GRID_MAX = 32, GRID_DEFAULT = 12;

  const TERRAINS = [
    { id: 'P', name: 'Plains',    image: 'assets/tiles/grass-plain.png', moveCost: 1 },
    { id: 'F', name: 'Forest',    image: 'assets/tiles/forest.png',      moveCost: 2 },
    { id: 'M', name: 'Mountains', image: 'assets/tiles/mountains.png',   moveCost: 3 },
    { id: 'S', name: 'Swamp',     image: 'assets/tiles/swamp.png',       moveCost: 2 },
  ];

  const UNIT_TYPES = [
    { id: 'Infantry',  abbr: 'INF', sprite: 'assets/units/infantry.png',           hp: 4, str: 1,   def: 0,   move: 2, wp: 1 },
    { id: 'Cavalry',   abbr: 'CAV', sprite: 'assets/units/cavalry.png',            hp: 3, str: 0.5, def: 1,   move: 4, wp: 2 },
    { id: 'Tanks',     abbr: 'TNK', sprite: 'assets/units/tank.png',               hp: 8, str: 3,   def: 3,   move: 3, wp: 4 },
    { id: 'Motorized', abbr: 'MOT', sprite: 'assets/units/motorized-infantry.png', hp: 6, str: 2,   def: 1,   move: 4, wp: 3 },
    { id: 'Artillery', abbr: 'ART', sprite: 'assets/units/artillery.png',          hp: 2, str: 3,   def: 0.5, move: 2, wp: 3 },
  ];

  const DOCTRINES = [
    { id: 'plain',      name: 'Plain',              icon: 'assets/icons/doctrine-plain.png' },
    { id: 'blitzkrieg', name: 'Blitzkrieg',         icon: 'assets/icons/doctrine-blitzkrieg.png' },
    { id: 'sf',         name: 'Superior Firepower', icon: 'assets/icons/doctrine-sf.png' },
    { id: 'formation',  name: 'Formation',          icon: 'assets/icons/doctrine-formation.png' },
    { id: 'trench',     name: 'Trench',             icon: 'assets/icons/doctrine-trench.png' },
  ];

  const FACINGS = ['N', 'E', 'S', 'W'];

  const TOOL = { TERRAIN: 'terrain', DECOR: 'decor', UNIT: 'unit', MOVE: 'move', ERASE: 'erase' };
  const TOOLS = [
    { id: TOOL.TERRAIN, label: 'Terrain', glyph: '▦' },
    { id: TOOL.DECOR,   label: 'Decor',   glyph: '✿' },
    { id: TOOL.UNIT,    label: 'Unit',    glyph: '⚑' },
    { id: TOOL.MOVE,    label: 'Move',    glyph: '✦' },
    { id: TOOL.ERASE,   label: 'Erase',   glyph: '✗' },
  ];

  // ── Helpers ────────────────────────────────────────────────
  const cellKey = (r, c) => `${r},${c}`;
  const makeGrid = (h, w) => Array.from({ length: h }, () => new Int8Array(w).fill(EMPTY));

  let nextUnitId = 1;
  const newUnit = (r, c, type, facing, player) => ({ id: nextUnitId++, r, c, type, facing, player });

  // ── Chroma key ─────────────────────────────────────────────
  function chromaKey(dataUrl) {
    return new Promise((resolve) => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => {
        const c = document.createElement('canvas');
        c.width = img.naturalWidth; c.height = img.naturalHeight;
        const ctx = c.getContext('2d');
        ctx.drawImage(img, 0, 0);
        let id;
        try { id = ctx.getImageData(0, 0, c.width, c.height); } catch { resolve(dataUrl); return; }
        const d = id.data;
        const kr = d[0], kg = d[1], kb = d[2], tol = 60;
        for (let i = 0; i < d.length; i += 4) {
          if (Math.abs(d[i]-kr)<tol && Math.abs(d[i+1]-kg)<tol && Math.abs(d[i+2]-kb)<tol) d[i+3]=0;
        }
        ctx.putImageData(id, 0, 0);
        let minX=c.width,maxX=-1,minY=c.height,maxY=-1;
        for (let y=0;y<c.height;y++) for (let x=0;x<c.width;x++) {
          if (d[(y*c.width+x)*4+3]>8) {
            if(x<minX)minX=x; if(x>maxX)maxX=x; if(y<minY)minY=y; if(y>maxY)maxY=y;
          }
        }
        if (maxX===-1) { resolve(c.toDataURL('image/png')); return; }
        const out=document.createElement('canvas');
        out.width=maxX-minX+1; out.height=maxY-minY+1;
        const octx=out.getContext('2d');
        octx.imageSmoothingEnabled=false;
        octx.drawImage(c,minX,minY,out.width,out.height,0,0,out.width,out.height);
        resolve(out.toDataURL('image/png'));
      };
      img.onerror = () => resolve(dataUrl);
      img.src = dataUrl;
    });
  }

  function useUnitSprites() {
    const [sprites, setSprites] = useState({});
    useEffect(() => {
      let cancelled = false;
      Promise.all(UNIT_TYPES.map(async (u) => [u.id, await chromaKey(u.sprite)]))
        .then((pairs) => { if (!cancelled) setSprites(Object.fromEntries(pairs)); });
      return () => { cancelled = true; };
    }, []);
    return sprites;
  }

  // ── BFS move preview ─────────────────────────────────────────
  function reachableTiles(grid, gridH, gridW, start, unit, occupied) {
    const visited = new Map();
    visited.set(cellKey(start.r, start.c), 0);
    const queue = [[start.r, start.c, 0]];
    const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
    while (queue.length) {
      const [r, c, cost] = queue.shift();
      for (const [dr, dc] of dirs) {
        const nr=r+dr, nc=c+dc;
        if (nr<0||nc<0||nr>=gridH||nc>=gridW) continue;
        const t = grid[nr][nc];
        if (t===EMPTY) continue;
        if (occupied.has(cellKey(nr,nc))) continue;
        const newCost = cost + TERRAINS[t].moveCost;
        if (newCost > unit.move) continue;
        const k = cellKey(nr,nc);
        if (visited.has(k) && visited.get(k)<=newCost) continue;
        visited.set(k,newCost);
        queue.push([nr,nc,newCost]);
      }
    }
    visited.delete(cellKey(start.r,start.c));
    return new Set(visited.keys());
  }

  // ── Command bar ─────────────────────────────────────────────
  function CommandBar({ hasBoard, gridW, gridH, onResize, onReset }) {
    return (
      <header className="cmd-bar">
        <span className="cb-mark">HQ //</span>
        <span className="cb-title">Tactical Map Builder</span>
        <span className="cb-sub">v0.20 · Field Edition</span>
        {hasBoard && (
          <span className="cb-sub" style={{ marginLeft: 6 }}>
            · SECTOR <b style={{ color: 'var(--teal)' }}>{gridW}×{gridH}</b>
          </span>
        )}
        <span className="cb-spacer"></span>
        {hasBoard && (
          <>
            <span className="cb-stamp">DRAFT</span>
            <button className="cb-btn" onClick={onResize}>↺ NEW SIZE</button>
            <button className="cb-btn danger" onClick={onReset}>✕ CLEAR DESK</button>
          </>
        )}
        <a className="cb-btn" href="Strategy%20Game%20Menu.html">← BACK TO HQ</a>
      </header>
    );
  }

  // ── Size form ───────────────────────────────────────────────
  function SizeForm({ onConfirm }) {
    const [w, setW] = useState(GRID_DEFAULT);
    const [h, setH] = useState(GRID_DEFAULT);
    const clamp = (v) => Math.max(GRID_MIN, Math.min(GRID_MAX, v|0));
    const submit = (e) => { e.preventDefault(); onConfirm(clamp(h), clamp(w)); };
    const presets = [
      { w: 8,  h: 8,  label: '8 × 8 · Skirmish' },
      { w: 11, h: 12, label: '11 × 12 · Standard 2P', recommended: true },
      { w: 16, h: 16, label: '16 × 16 · Operation' },
      { w: 24, h: 18, label: '24 × 18 · Theater' },
    ];
    return (
      <form className="size-form" onSubmit={submit}>
        <div className="tape-strip"></div>
        <div className="tape-strip right"></div>
        <div className="sf-header">
          <div>
            <h2>Sealed Briefing</h2>
            <div className="sf-sub">Dimensions of the new tactical map</div>
          </div>
          <div className="sf-stamp">CONFIDENTIAL</div>
        </div>
        <div className="sf-row">
          <label>
            <span className="lbl">Width · columns</span>
            <input type="number" value={w} min={GRID_MIN} max={GRID_MAX} onChange={(e)=>setW(Number(e.target.value))} />
          </label>
          <label>
            <span className="lbl">Height · rows</span>
            <input type="number" value={h} min={GRID_MIN} max={GRID_MAX} onChange={(e)=>setH(Number(e.target.value))} />
          </label>
        </div>
        <div className="sf-presets">
          {presets.map((p)=>(
            <button key={p.label} type="button" className={'preset'+(p.recommended?' recommended':'')}
              onClick={()=>{setW(p.w);setH(p.h);}}>
              {p.label}{p.recommended?' ★':''}
            </button>
          ))}
        </div>
        <div className="sf-foot">
          <span className="sf-hint">range {GRID_MIN}–{GRID_MAX} · default {GRID_DEFAULT}×{GRID_DEFAULT}</span>
          <button type="submit" className="sf-submit">Open Desk <span className="arr">▸</span></button>
        </div>
      </form>
    );
  }

  // ── Terrain palette ─────────────────────────────────────────
  function TerrainPalette({ selected, onSelect }) {
    return (
      <div className="section">
        <div className="section-head">
          <span className="num">01</span><h4>Terrain</h4>
          <span className="hint">click · drag to paint</span>
        </div>
        <div className="terrain-grid">
          {TERRAINS.map((t,i)=>(
            <button key={t.id} type="button" className={'terrain-chip'+(selected===i?' active':'')} onClick={()=>onSelect(i)}>
              <div className="tile-thumb" style={{backgroundImage:`url('${t.image}')`}}></div>
              <div>
                <div className="terrain-name">{t.name}</div>
                <div className="terrain-code">{t.id} · mv {t.moveCost}</div>
              </div>
            </button>
          ))}
        </div>
      </div>
    );
  }

  // ── Facing rose ─────────────────────────────────────────────
  function FacingRose({ value, onChange }) {
    const angle = {N:0,E:90,S:180,W:270}[value]||0;
    return (
      <div className="facing-rose">
        <div className="rose-bg"></div>
        <div className="arrow" style={{transform:`rotate(${angle}deg)`}}></div>
        {FACINGS.map((f)=>(
          <button key={f} type="button" className={'dir '+f.toLowerCase()+(value===f?' active':'')} onClick={()=>onChange(f)}>{f}</button>
        ))}
      </div>
    );
  }

  // ── Unit palette ─────────────────────────────────────────────
  function UnitPalette({ selectedType, onSelectType, player, onPlayer, facing, onFacing, doctrine, onDoctrine, sprites, pendingCount, onPlace, onCancel }) {
    return (
      <>
        <div className="section">
          <div className="section-head"><span className="num">01</span><h4>Player</h4></div>
          <div className="row-pills">
            <button type="button" className={'pill p1'+(player===1?' active':'')} onClick={()=>onPlayer(1)}>◆ Player 1 · Blue</button>
            <button type="button" className={'pill p2'+(player===2?' active':'')} onClick={()=>onPlayer(2)}>◆ Player 2 · Red</button>
          </div>
        </div>
        <div className="section">
          <div className="section-head"><span className="num">02</span><h4>Doctrine</h4></div>
          <div className="row-pills">
            {DOCTRINES.map((d)=>(
              <button key={d.id} type="button" className={'pill icon-pill'+(doctrine===d.id?' active':'')} onClick={()=>onDoctrine(d.id)} title={d.name}>
                <img src={d.icon} alt="" />{d.id==='sf'?'SF':d.name.split(' ')[0].slice(0,5)}
              </button>
            ))}
          </div>
        </div>
        <div className="section">
          <div className="section-head"><span className="num">03</span><h4>Facing</h4></div>
          <FacingRose value={facing} onChange={onFacing} />
        </div>
        <div className="section">
          <div className="section-head"><span className="num">04</span><h4>Order of Battle</h4><span className="hint">shift = multi</span></div>
          {UNIT_TYPES.map((u)=>(
            <div key={u.id} className={'unit-row'+(selectedType===u.id?' active':'')} onClick={()=>onSelectType(u.id)}>
              <div className="un-thumb">
                {sprites[u.id]?<img src={sprites[u.id]} alt={u.id} />:<span style={{fontFamily:'VT323,monospace',color:'#6b4e2a'}}>{u.abbr}</span>}
              </div>
              <div className="un-meta">
                <div className="un-name">{u.id}</div>
                <div className="un-stats">HP {u.hp} · STR {u.str} · DEF {u.def} · MV {u.move}</div>
              </div>
            </div>
          ))}
        </div>
        {pendingCount>0&&(
          <div className="action-strip">
            <div style={{fontFamily:'VT323,monospace',fontSize:14,color:'var(--olive)',letterSpacing:1,textAlign:'center',marginBottom:2}}>
              {pendingCount} cell{pendingCount!==1?'s':''} staged
            </div>
            <button className="btn-primary" onClick={onPlace}><span className="glyph">✓</span>Deploy {pendingCount} Unit{pendingCount!==1?'s':''}</button>
            <button className="btn-ghost" onClick={onCancel}>Cancel staging</button>
          </div>
        )}
      </>
    );
  }

  // ── Decoration palette ──────────────────────────────────────
  function DecorationPalette({ slots, selected, onSelect, onLoad, onRemove }) {
    const inputRef = useRef(null);
    const pendingSlot = useRef(null);
    const pickFile = (idx) => { pendingSlot.current=idx; inputRef.current.value=''; inputRef.current.click(); };
    const handleFile = (e) => {
      const f=e.target.files?.[0]; if(!f)return;
      const reader=new FileReader();
      reader.onload=()=>onLoad(pendingSlot.current,{src:reader.result,name:f.name.replace(/\.[^.]+$/,'').replace(/[-_]/g,' ')||'Decor'});
      reader.readAsDataURL(f);
    };
    return (
      <div className="section">
        <div className="section-head"><span className="num">01</span><h4>Decorations</h4><span className="hint">load PNG</span></div>
        <div className="decor-grid">
          {slots.map((slot,i)=>(
            <div key={i} className={'decor-slot'+(slot?'':' empty')+(selected===i?' active':'')} onClick={()=>slot?onSelect(i):pickFile(i)}>
              {slot?(<><img src={slot.src} alt={slot.name}/><div className="dc-actions">
                <button onClick={(e)=>{e.stopPropagation();pickFile(i);}}>SWAP</button>
                <button onClick={(e)=>{e.stopPropagation();onRemove(i);}}>✕</button>
              </div></>):'+'}
            </div>
          ))}
        </div>
        <input ref={inputRef} type="file" accept="image/*" className="hidden" onChange={handleFile} />
      </div>
    );
  }

  // ── Move info ────────────────────────────────────────────────
  function MoveInfo({ selectedUnit, sprites, onChangeFacing }) {
    if(!selectedUnit) return (
      <div className="section">
        <div className="section-head"><span className="num">01</span><h4>Move Order</h4></div>
        <p style={{fontFamily:'Courier Prime,monospace',fontSize:12,color:'var(--ink)',lineHeight:1.5,padding:'4px 0'}}>
          Click a unit token on the field map. Reachable tiles will glow <span style={{color:'var(--gold)'}}>gold</span>; click one to march.
        </p>
      </div>
    );
    const def = UNIT_TYPES.find((u)=>u.id===selectedUnit.type);
    return (
      <div className="section">
        <div className="section-head"><span className="num">01</span><h4>Selected</h4></div>
        <div style={{display:'flex',gap:10,alignItems:'center',padding:'8px',background:'var(--paper-light)',border:'1px solid var(--ink)'}}>
          <div className="un-thumb" style={{width:42,height:42,border:'1px solid var(--ink)',background:'var(--paper-aged)',display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden'}}>
            {sprites[def.id]?<img src={sprites[def.id]} alt="" style={{maxWidth:'100%',maxHeight:'100%',imageRendering:'pixelated'}} />:<span style={{fontFamily:'VT323,monospace'}}>{def.abbr}</span>}
          </div>
          <div style={{flex:1}}>
            <div style={{fontFamily:'Special Elite,monospace',fontSize:12,letterSpacing:1.5,color:selectedUnit.player===1?'var(--blue)':'var(--red)'}}>{def.id.toUpperCase()}</div>
            <div style={{fontFamily:'VT323,monospace',fontSize:13,color:'var(--olive)',letterSpacing:1}}>P{selectedUnit.player} · ({selectedUnit.c},{selectedUnit.r}) · F:{selectedUnit.facing}</div>
            <div style={{fontFamily:'VT323,monospace',fontSize:12,color:'var(--olive)'}}>HP {def.hp} · MV {def.move}</div>
          </div>
        </div>
        <div style={{marginTop:10}}>
          <div className="section-head"><span className="num">02</span><h4>Rotate</h4></div>
          <FacingRose value={selectedUnit.facing} onChange={onChangeFacing} />
        </div>
      </div>
    );
  }

  function EraseInfo() {
    return (
      <div className="section">
        <div className="section-head"><span className="num">01</span><h4>Erase</h4></div>
        <p style={{fontFamily:'Courier Prime,monospace',fontSize:12,color:'var(--ink)',lineHeight:1.5,padding:'4px 0'}}>
          Click or drag across cells to lift the terrain, decorations and units beneath your pencil.
        </p>
      </div>
    );
  }

  // ── Board ────────────────────────────────────────────────────
  function Board({ grid,gridH,gridW,decorations,units,sprites,unitIndex,pendingCells,selectedUnitId,reachable,showZones,tool,onCellAction,onCellEnter,painting }) {
    const cellPx = useMemo(()=>{
      const m=Math.max(gridH,gridW);
      if(m<=10)return 60; if(m<=14)return 50; if(m<=20)return 40; if(m<=26)return 32; return 26;
    },[gridH,gridW]);
    return (
      <div className="board"
        style={{gridTemplateColumns:`repeat(${gridW},${cellPx}px)`,gridTemplateRows:`repeat(${gridH},${cellPx}px)`}}
        onMouseLeave={()=>painting.current=false}>
        {Array.from({length:gridH},(_,r)=>Array.from({length:gridW},(_,c)=>{
          const t=grid[r]?.[c]??EMPTY;
          const terrain=t>=0?TERRAINS[t]:null;
          const decor=decorations.get(cellKey(r,c));
          const unitId=unitIndex.get(cellKey(r,c));
          const unit=unitId!=null?units.find((u)=>u.id===unitId):null;
          const k=cellKey(r,c);
          const isPend=pendingCells?.has(k);
          const isReach=reachable?.has(k);
          const isSel=unit&&unit.id===selectedUnitId;
          const midRow=Math.floor(gridH/2);
          const zoneCls=showZones?(r<=midRow-1?'zone-red':(r>=midRow+(gridH%2)?'zone-blue':'')):'';
          const classes=['cell',!terrain?'no-bg':'',isReach?'legal':'',isPend?'pending':'',isSel?'selected':'',zoneCls].filter(Boolean).join(' ');
          return (
            <div key={k} className={classes}
              onMouseDown={(e)=>{e.preventDefault();painting.current=true;onCellAction(r,c,e.shiftKey);}}
              onMouseEnter={()=>onCellEnter(r,c,painting.current)}>
              {terrain&&<img src={terrain.image} alt="" className="tile-img" draggable={false} />}
              {decor&&<img src={decor.src} alt="" className="decor-img" draggable={false} />}
              {unit&&(
                <div className={'unit-chip p'+unit.player+(isSel?' selected':'')+' '+unit.type.toLowerCase()}>
                  {sprites[unit.type]
                    ?<img src={sprites[unit.type]} alt="" draggable={false} />
                    :<span style={{fontFamily:'VT323,monospace',color:'#fff',textShadow:'0 0 4px #000',fontSize:cellPx*0.3}}>{UNIT_TYPES.find((x)=>x.id===unit.type)?.abbr}</span>
                  }
                  {cellPx>=30&&<span className="facing-tag">{unit.facing}</span>}
                </div>
              )}
            </div>
          );
        }))}
      </div>
    );
  }

  // ── Root component ─────────────────────────────────────────
  function MapBuilder() {
    const [gridH,setGridH]=useState(0);
    const [gridW,setGridW]=useState(0);
    const [grid,setGrid]=useState(null);
    const [decorations,setDecorations]=useState(new Map());
    const [units,setUnits]=useState([]);
    const [tool,setTool]=useState(TOOL.TERRAIN);
    const [selTerrain,setSelTerrain]=useState(0);
    const [decorSlots,setDecorSlots]=useState(Array(6).fill(null));
    const [selDecor,setSelDecor]=useState(0);
    const [player,setPlayer]=useState(1);
    const [selUnitType,setSelUnitType]=useState('Infantry');
    const [facing,setFacing]=useState('N');
    const [doctrine,setDoctrine]=useState('plain');
    const [pendingCells,setPending]=useState(new Set());
    const [selUnitId,setSelUnitId]=useState(null);
    const [reachable,setReachable]=useState(null);
    const [hoveredCell,setHovered]=useState(null);
    const [showZones,setShowZones]=useState(true);
    const sprites=useUnitSprites();
    const painting=useRef(false);

    const unitIndex=useMemo(()=>{
      const m=new Map();
      for(const u of units)m.set(cellKey(u.r,u.c),u.id);
      return m;
    },[units]);

    useEffect(()=>{
      const up=()=>{painting.current=false;};
      window.addEventListener('mouseup',up);
      return ()=>window.removeEventListener('mouseup',up);
    },[]);

    const initGrid=useCallback((h,w)=>{
      setGridH(h);setGridW(w);setGrid(makeGrid(h,w));
      setDecorations(new Map());setUnits([]);setPending(new Set());setSelUnitId(null);setReachable(null);
    },[]);

    const hasBoard=grid!==null;

    const handleCellAction=useCallback((r,c,shiftKey)=>{
      if(!grid)return;
      if(tool===TOOL.TERRAIN){setGrid((prev)=>{const next=prev.map((row)=>new Int8Array(row));next[r][c]=selTerrain;return next;});return;}
      if(tool===TOOL.ERASE){
        setGrid((prev)=>{const next=prev.map((row)=>new Int8Array(row));next[r][c]=EMPTY;return next;});
        setDecorations((prev)=>{const m=new Map(prev);m.delete(cellKey(r,c));return m;});
        setUnits((prev)=>prev.filter((u)=>!(u.r===r&&u.c===c)));return;
      }
      if(tool===TOOL.DECOR){
        const slot=decorSlots[selDecor];if(!slot)return;
        setDecorations((prev)=>{const m=new Map(prev);const k=cellKey(r,c);if(m.get(k)?.src===slot.src)m.delete(k);else m.set(k,slot);return m;});return;
      }
      if(tool===TOOL.UNIT){
        if(grid[r][c]===EMPTY||unitIndex.has(cellKey(r,c)))return;
        const k=cellKey(r,c);
        setPending((prev)=>{const next=new Set(shiftKey?prev:[]);next.has(k)?next.delete(k):next.add(k);return next;});return;
      }
      if(tool===TOOL.MOVE){
        const clickedId=unitIndex.get(cellKey(r,c));
        if(clickedId!=null){
          setSelUnitId(clickedId);
          const u=units.find((x)=>x.id===clickedId);
          if(u){
            const def=UNIT_TYPES.find((d)=>d.id===u.type);
            const occupied=new Set(units.filter((x)=>x.id!==clickedId).map((x)=>cellKey(x.r,x.c)));
            setReachable(reachableTiles(grid,gridH,gridW,{r:u.r,c:u.c},def,occupied));
          }return;
        }
        if(selUnitId!=null&&reachable?.has(cellKey(r,c))){
          setUnits((prev)=>prev.map((u)=>u.id===selUnitId?{...u,r,c}:u));
          setSelUnitId(null);setReachable(null);
        }else{setSelUnitId(null);setReachable(null);}
      }
    },[grid,tool,selTerrain,decorSlots,selDecor,unitIndex,units,selUnitId,reachable,gridH,gridW]);

    const handleCellEnter=useCallback((r,c,paintingFlag)=>{
      setHovered([r,c]);
      if(!paintingFlag)return;
      if(tool===TOOL.TERRAIN){setGrid((prev)=>{if((prev[r]?.[c]??EMPTY)===selTerrain)return prev;const next=prev.map((row)=>new Int8Array(row));next[r][c]=selTerrain;return next;});}
      if(tool===TOOL.ERASE){
        setGrid((prev)=>{if((prev[r]?.[c]??EMPTY)===EMPTY)return prev;const next=prev.map((row)=>new Int8Array(row));next[r][c]=EMPTY;return next;});
        setDecorations((prev)=>{const m=new Map(prev);m.delete(cellKey(r,c));return m;});
        setUnits((prev)=>prev.filter((u)=>!(u.r===r&&u.c===c)));
      }
    },[tool,selTerrain]);

    const placeUnits=useCallback(()=>{
      const placed=[];
      for(const k of pendingCells){
        const [r,c]=k.split(',').map(Number);
        if(unitIndex.has(k)||grid[r]?.[c]===EMPTY)continue;
        placed.push(newUnit(r,c,selUnitType,facing,player));
      }
      setUnits((prev)=>[...prev,...placed]);setPending(new Set());
    },[pendingCells,unitIndex,grid,selUnitType,facing,player]);

    const rotateSelectedUnit=useCallback((f)=>{
      if(selUnitId==null)return;
      setUnits((prev)=>prev.map((u)=>u.id===selUnitId?{...u,facing:f}:u));
    },[selUnitId]);

    const filledCount=useMemo(()=>{
      if(!grid)return 0;let n=0;
      for(let r=0;r<gridH;r++)for(let c=0;c<gridW;c++)if((grid[r]?.[c]??EMPTY)!==EMPTY)n++;
      return n;
    },[grid,gridH,gridW]);

    const handleResize=useCallback(()=>{if(window.confirm('Resize the desk? All terrain, decorations and units will be cleared.'))setGrid(null);},[]);
    const handleReset=useCallback(()=>{if(!hasBoard)return;if(window.confirm('Clear the desk? Removes terrain, decorations and units but keeps the size.')){setGrid(makeGrid(gridH,gridW));setDecorations(new Map());setUnits([]);setPending(new Set());setSelUnitId(null);setReachable(null);}},[hasBoard,gridH,gridW]);
    const switchTool=useCallback((t)=>{setTool(t);setPending(new Set());setSelUnitId(null);setReachable(null);},[]);

    const selectedUnit=units.find((u)=>u.id===selUnitId)||null;
    const hoverTerrain=hoveredCell?(grid?.[hoveredCell[0]]?.[hoveredCell[1]]>=0?TERRAINS[grid[hoveredCell[0]][hoveredCell[1]]].name:null):null;

    return (
      <>
        <CommandBar hasBoard={hasBoard} gridW={gridW} gridH={gridH} onResize={handleResize} onReset={handleReset} />
        <div className="stage">
          {!hasBoard?(
            <SizeForm onConfirm={initGrid} />
          ):(
            <div className="workbench">
              <aside className="tool-tray">
                <div className="tray-title">
                  <span>Field Tools</span>
                  <span className="stamp-num">#{String(tool).slice(0,3).toUpperCase()}</span>
                </div>
                <div className="tool-strip">
                  {TOOLS.map((t)=>(
                    <button key={t.id} type="button" className={'tool-btn'+(tool===t.id?' active':'')} onClick={()=>switchTool(t.id)}>
                      <span className="glyph">{t.glyph}</span>{t.label}
                    </button>
                  ))}
                </div>
                <div className="tray-body">
                  {tool===TOOL.TERRAIN&&<TerrainPalette selected={selTerrain} onSelect={setSelTerrain} />}
                  {tool===TOOL.DECOR&&<DecorationPalette slots={decorSlots} selected={selDecor} onSelect={setSelDecor}
                    onLoad={(i,d)=>{setDecorSlots((prev)=>{const n=[...prev];n[i]=d;return n;});setSelDecor(i);}}
                    onRemove={(i)=>setDecorSlots((prev)=>{const n=[...prev];n[i]=null;return n;})} />}
                  {tool===TOOL.UNIT&&<UnitPalette selectedType={selUnitType} onSelectType={setSelUnitType}
                    player={player} onPlayer={setPlayer} facing={facing} onFacing={setFacing}
                    doctrine={doctrine} onDoctrine={setDoctrine} sprites={sprites}
                    pendingCount={pendingCells.size} onPlace={placeUnits} onCancel={()=>setPending(new Set())} />}
                  {tool===TOOL.MOVE&&<MoveInfo selectedUnit={selectedUnit} sprites={sprites} onChangeFacing={rotateSelectedUnit} />}
                  {tool===TOOL.ERASE&&<EraseInfo />}
                  <div className="section" style={{marginTop:14,paddingTop:10,borderTop:'1px dashed var(--olive)'}}>
                    <div className="section-head"><span className="num">⚐</span><h4>Deployment Zones</h4></div>
                    <button type="button" className={'pill'+(showZones?' active':'')} onClick={()=>setShowZones((s)=>!s)}>
                      {showZones?'◉ Zones On':'○ Zones Off'}
                    </button>
                    <div style={{fontFamily:'VT323,monospace',fontSize:12,color:'var(--olive)',letterSpacing:1,marginTop:6,lineHeight:1.4}}>
                      Red half = P1 setup<br />Blue half = P2 setup
                    </div>
                  </div>
                </div>
              </aside>

              <section className="map-frame">
                <div className="compass">
                  <span className="n">N</span><span className="s">S</span>
                  <span className="e">E</span><span className="w">W</span>
                </div>
                <div className="map-cap">
                  <h3>Field Map · SECTOR 06-N</h3>
                  <div className="stamp-row">
                    <span><span className="coord-stamp">{gridW}×{gridH}</span></span>
                    <span className="tool-stamp">{TOOLS.find((t)=>t.id===tool)?.label}</span>
                  </div>
                </div>
                <div className="board-scroll">
                  <Board grid={grid} gridH={gridH} gridW={gridW} decorations={decorations} units={units} sprites={sprites}
                    unitIndex={unitIndex} pendingCells={pendingCells} selectedUnitId={selUnitId} reachable={reachable}
                    showZones={showZones} tool={tool} onCellAction={handleCellAction} onCellEnter={handleCellEnter} painting={painting} />
                </div>
                <div className="map-foot">
                  <span><span className="blink">●</span> LIVE · {hoveredCell
                    ?<>cell <span className="v">[{hoveredCell[1]},{hoveredCell[0]}]</span>{hoverTerrain?<> · <span className="red">{hoverTerrain}</span></>:null}</>
                    :<>hover a cell</>}</span>
                  <span>
                    PAINTED <span className="v">{filledCount}</span> / {gridW*gridH}
                    {' · '}UNITS <span className="red">{units.length}</span>
                    {' · '}P1 <span className="v" style={{color:'var(--blue)'}}>{units.filter((u)=>u.player===1).length}</span>
                    {' · '}P2 <span className="red">{units.filter((u)=>u.player===2).length}</span>
                  </span>
                </div>
              </section>
            </div>
          )}
        </div>
        <div className="hint">
          ▸ {hasBoard?`${TOOLS.find((t)=>t.id===tool)?.label.toUpperCase()} mode — click to act, drag to repeat`:'Pick a sector size to open the desk'}
        </div>
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById('app')).render(<MapBuilder />);
})();
</script>
</body>
</html>
